<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1033"/>
      <stop offset="40%" style="stop-color:#0A0A12"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#7B2FFF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#4A7BF7"/>
    </linearGradient>
    <linearGradient id="popGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B2FFF"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="250" cy="150" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="400" cy="50" r="2" fill="#fff" opacity="0.25"/>
  <circle cx="550" cy="120" r="1" fill="#fff" opacity="0.35"/>
  <circle cx="700" cy="60" r="2.5" fill="#fff" opacity="0.3"/>
  <circle cx="850" cy="100" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="1000" cy="70" r="2" fill="#fff" opacity="0.25"/>
  <circle cx="1100" cy="140" r="1" fill="#fff" opacity="0.35"/>
  <circle cx="150" cy="500" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="350" cy="550" r="1.5" fill="#fff" opacity="0.25"/>
  <circle cx="600" cy="520" r="2" fill="#fff" opacity="0.35"/>
  <circle cx="900" cy="480" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="1050" cy="530" r="2" fill="#fff" opacity="0.25"/>
  <!-- Brand name -->
  <text x="600" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="900" text-anchor="middle" fill="url(#textGrad)">Horósco</text>
  <text x="600" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="900" text-anchor="middle" dx="270" fill="url(#popGrad)">PoP</text>
  <!-- Tagline -->
  <text x="600" y="340" font-family="monospace" font-size="18" text-anchor="middle" fill="#C4B5FD" letter-spacing="6">TU COSMOS, CADA DÍA</text>
  <!-- Description -->
  <text x="600" y="420" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#B8B5C8">Horóscopo diario personalizado basado en</text>
  <text x="600" y="455" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#B8B5C8">tránsitos planetarios reales</text>
  <!-- Powered by -->
  <text x="600" y="510" font-family="monospace" font-size="14" text-anchor="middle" fill="#6B6882">Powered by Astral PoP Engine™</text>
</svg>
